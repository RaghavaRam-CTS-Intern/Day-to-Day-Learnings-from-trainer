<!DOCTYPE html>
 
<html>
<head>
<title>Second Layout</title>
 
<style>
 
* {
margin: 0px;
padding: 0px;
box-sizing: box-border;
}
 
body {
height: 100vh;
}
 
#lona-div {
display: flex;
justify-content: space-between;
background-color: lightgrey;
min-height: 40px;
line-height: 40px;
}
 
#logo {
padding-left: 2%;
}
 
#nav {
padding-right: 10%;
}
 
#head-div {
margin-top: 10px;
background-color: lightgrey;
min-height: 100px;
line-height: 100px;
text-align: center;
}
 
#text-div {
margin-top: 10px;
background-color: lightgrey;
text-align: center;
min-height: 75px;
line-height: 75px;
}
 
#container {
display: flex;
 
justify-content: space-between;
margin-top: 20px;
}
 
.box {
background-color: lightgrey;
min-height: 350px;
width: 30%;
line-height: 350px;
text-align: center;
}
 
#foot-div {
background-color: lightgrey;
min-height: 40px;
line-height: 40px;
text-align: center;
margin-top: 20px;
}
 
</style>
</head>
 
<body>
 
<div id="lona-div">
<div id="logo">Logo</div> <div id="nav">Navigation</div>
</div>
 
<div id="head-div">
Header / Banner
</div>
 
<div id="text-div">
Intro Text Area
</div>
 
<div id="container">
<div class="box">
Box 1
</div>
 
<div class="box">
Box 2
</div>
 
<div class="box">
Box 3
</div>
</div>
 
<div id="foot-div">
Footer
</div>
 
</body>
 
</html>
