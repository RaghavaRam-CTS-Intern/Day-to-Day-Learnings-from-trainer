<!DOCTYPE html>
 
<html>
<head>
<title>First Layout</title>
<style>
 
* {
margin: 0px;
padding: 0px;
box-sizing: border-box;
}
 
#logo-div {
background-color: lightgrey;
min-height: 30px;
line-height: 30px;
width: 100%;
padding-left: 2%;
margin-bottom: 5px;
}
 
#nav-div {
background-color: lightgrey;
text-align: center;
min-height: 25px;
line-height: 25px;
width: 100%;
}
 
#head-div {
margin-top: 5px;
margin-bottom: 20px;
background-color: lightgrey;
text-align: center;
min-height: 150px;
width: 100%;
line-height: 100px;
}
 
#parent-div {
width: 100%;
display: flex;
flex-direction: row;
gap: 20px;
}
 
#side-div {
background-color: lightgrey;
width: 30%;
min-height: 375px;
text-align: center;
line-height: 375px;
}
 
#body-div {
background-color: lightgrey;
width: 70%;
min-height: 375px;
line-height: 375px;
text-align: center;
}
 
#foot-div {
background-color: lightgrey;
margin-top: 20px;
width: 100%;
min-height: 40px;
line-height: 40px;
text-align: center;
}

#wrap{
width: 80%;
margin: auto
}
 
</style>
</head>
 
<body>
<div id="wrap">
<div id="logo-div">
logo
</div>
 
<div id="nav-div">
Navigation
</div>
 
<div id="head-div">
Header/Banner
</div>
 
<div id="parent-div">
<div id="side-div">
Side Bar
</div>
<div id="body-div">
Body Area
</div>
</div>
 
<div id="foot-div">
Footer
</div>
</div>
 
</body>
</html>
